<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Atoll — Pacific Climate Change{% endblock %}</title>
    <meta name="description" content="An interactive look at climate change across 22 Pacific Island countries and territories.">

    <link rel="stylesheet" href="/static/vendor/fonts.css">

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="site-header">
    <a class="wordmark" href="/">Atoll</a>
    <nav>
        <a href="/app">Explore the data</a>
    </nav>
    <div class="controls">
        <select id="fontSizeToggle" aria-label="Toggle text size">
            <option value="90%">Small text</option>
            <option value="100%">Medium text</option>
            <option value="110%">Large text</option>
        </select>
        <button id="themeToggle" aria-label="Toggle light/dark theme">Dark mode</button>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <p>Built for the <a href="https://pacificdatavizchallenge.org/" target="_blank" rel="noopener">2026 Pacific Dataviz Challenge</a>. Data: SPC / PDH.stat.</p>
</footer>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    const savedTheme = localStorage.getItem('atoll-theme') || 'light';
    htmlEl.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'light' ? 'Dark mode' : 'Light mode';
    themeToggle.addEventListener('click', () => {
        const next = htmlEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        htmlEl.setAttribute('data-theme', next);
        localStorage.setItem('atoll-theme', next);
        themeToggle.textContent = next === 'light' ? 'Dark mode' : 'Light mode';
        document.dispatchEvent(new CustomEvent('atoll-theme-change', { detail: { theme: next } }));
    });

    const fontToggle = document.getElementById('fontSizeToggle');
    const savedFont = localStorage.getItem('atoll-font-size') || '100%';
    htmlEl.style.fontSize = savedFont;
    fontToggle.value = savedFont;
    fontToggle.addEventListener('change', (e) => {
        htmlEl.style.fontSize = e.target.value;
        localStorage.setItem('atoll-font-size', e.target.value);
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
